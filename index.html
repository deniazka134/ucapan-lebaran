<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌙 Deni Wafdullah - Idul Fitri 1447H 🌙</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', -apple-system, sans-serif;
      background: radial-gradient(ellipse at top, #0f2027 0%, #203a43 25%, #2c5364 50%, #0f9d58 100%);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      overflow: hidden;
      position: relative;
    }

    .hidden { display: none !important; }

    /* ✨ BINTANG LEBARAN ✨ */
    .stars {
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(2px 2px at 20px 30px, #ffd700, transparent),
        radial-gradient(2px 2px at 40px 70px, #fff, transparent),
        radial-gradient(1px 1px at 90px 40px, #ffd700, transparent),
        radial-gradient(1px 1px at 130px 80px, #fff, transparent);
      background-repeat: repeat;
      background-size: 200px 100px;
      animation: twinkleStars 20s linear infinite;
      opacity: 0.8;
    }

    @keyframes twinkleStars {
      0%, 100% { opacity: 0.8; transform: translateX(0) translateY(0); }
      50% { opacity: 1; transform: translateX(-50px) translateY(-20px); }
    }

    /* 🌙 BULAN SABIT PREMIUM */
    .moon {
      position: absolute;
      top: 8vh;
      right: 8vw;
      width: 90px;
      height: 90px;
      background: radial-gradient(circle at 30% 30%, #fff8dc 40%, transparent 40%),
                  radial-gradient(circle at 70% 50%, transparent 30%, #0f9d58 50%);
      border-radius: 50%;
      box-shadow: 
        0 0 30px #ffd700,
        inset 0 0 20px rgba(255,255,255,0.3);
      animation: moonFloat 5s ease-in-out infinite;
    }

    @keyframes moonFloat {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(2deg); }
    }

    /* 🕌 MASJID SILUET */
    .mosque {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 140px;
      background: 
        linear-gradient(transparent 70%, #0f9d58 100%),
        url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 40"><path fill="%230f9d58" opacity="0.6" d="M0 30 L10 20 L20 25 L30 15 L40 22 L50 18 L60 24 L70 16 L80 23 L90 19 L100 30 Z"/><circle cx="25" cy="12" r="3" fill="%23fff"/><circle cx="75" cy="10" r="2.5" fill="%23fff"/></svg>') repeat-x;
      background-size: 100px 40px, auto 140px;
      animation: mosqueWave 15s ease-in-out infinite;
    }

    @keyframes mosqueWave {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(20px); }
    }

    /* CONTAINER */
    .container {
      max-width: 480px;
      padding: 35px 30px;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 25px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 
        0 25px 45px rgba(0,0,0,0.3),
        inset 0 1px 0 rgba(255,255,255,0.4);
      z-index: 10;
      position: relative;
      animation: containerGlow 2s ease-out;
    }

    @keyframes containerGlow {
      0% { 
        opacity: 0; 
        transform: translateY(50px) scale(0.9); 
        filter: blur(10px);
      }
      100% { 
        opacity: 1; 
        transform: translateY(0) scale(1); 
        filter: blur(0);
      }
    }

    h1 {
      font-size: 22px;
      line-height: 1.7;
      margin-bottom: 20px;
      font-weight: 500;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }

    .name {
      font-size: 16px;
      font-weight: 700;
      background: linear-gradient(45deg, #ffd700, #fff, #ffd700);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 30px;
      text-shadow: none;
      animation: nameShine 3s ease-in-out infinite;
    }

    @keyframes nameShine {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.3); }
    }

    /* BUTTONS - BERSAMPINGAN NORMAL */
    .btn-group {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 25px;
      position: relative;
      overflow: visible; /* Biar tombol maaf bisa keluar */
    }

    button {
      padding: 16px 32px;
      border: none;
      border-radius: 16px;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
      position: relative;
    }

    .btn-maafkan {
      background: linear-gradient(135deg, #ffd700, #ffed4a);
      color: #1a1a1a;
      z-index: 2;
    }

    .btn-maafkan:hover:not(.growing) {
      transform: translateY(-4px);
      box-shadow: 0 12px 35px rgba(255, 215, 0, 0.5);
    }

    .btn-enggak {
      background: linear-gradient(135deg, #ff6b6b, #ee5a52);
      color: white;
      z-index: 1;
    }

    /* EFEK MEMBESAR BERTAHAP - INFINITE */
    .btn-maafkan.grow1 { transform: scale(1.15); z-index: 3; }
    .btn-maafkan.grow2 { transform: scale(1.35); z-index: 4; font-size: 18px; padding: 20px 40px; }
    .btn-maafkan.grow3 { transform: scale(1.6); z-index: 5; font-size: 20px; padding: 24px 48px; }
    .btn-maafkan.grow4 { transform: scale(1.9); z-index: 6; font-size: 22px; padding: 26px 52px; }
    .btn-maafkan.grow5 { transform: scale(2.2); z-index: 7; font-size: 24px; padding: 30px 60px; }
    .btn-maafkan.grow6 { transform: scale(2.6); z-index: 8; font-size: 28px; padding: 34px 68px; }
    .btn-maafkan.grow7 { transform: scale(3.0); z-index: 9; font-size: 32px; padding: 38px 76px; }
    .btn-maafkan.grow8 { transform: scale(3.5); z-index: 10; font-size: 36px; padding: 42px 84px; }

    .wa-btn {
      display: block;
      margin: 0 auto;
      background: linear-gradient(135deg, #25D366, #128C7E);
      color: white !important;
      padding: 18px 40px;
      font-size: 17px;
      width: 100%;
      max-width: 280px;
      border-radius: 25px;
      z-index: 10;
    }

    .wa-btn:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 15px 35px rgba(37, 211, 102, 0.5);
    }

    /* THR GLOW */
    .thr-glow {
      text-shadow: 0 0 20px #ffd700;
      font-size: 28px;
      margin: 15px 0;
      animation: thrPulse 1.5s ease-in-out infinite;
    }

    @keyframes thrPulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px #ffd700); }
      50% { transform: scale(1.15); filter: drop-shadow(0 0 25px #ffd700); }
    }

    @media (max-width: 480px) {
      .container { margin: 20px; padding: 25px 20px; }
      .btn-group { gap: 15px; }
      .btn-maafkan.grow6 { transform: scale(2.0) !important; }
      .btn-maafkan.grow7 { transform: scale(2.3) !important; }
      .btn-maafkan.grow8 { transform: scale(2.6) !important; }
    }
  </style>
</head>
<body>

<div class="stars"></div>
<div class="moon"></div>
<div class="mosque"></div>

<!-- PAGE 1 -->
<div class="container" id="page1">
  <h1>
    🌙 Selamat Hari Raya Idul Fitri 1445H 🌙<br>
    تَقَبَّلَ اللَّهُ مِنَّا وَمِنْكُمْ<br>
    Mohon maaf lahir <strong>&</strong> batin.<br>
    Maafkan Deni jika banyak salah & dosa 🙏
  </h1>

  <div class="name">✨ Deni Wafdullah ✨</div>

  <div class="btn-group">
    <button class="btn-maafkan" id="maafBtn" onclick="maafkanDeni()">
      ✅ Maafkan!
    </button>
    <button class="btn-enggak" id="enggakBtn" onclick="enggakMaaf()">
      ❌ Enggak!
    </button>
  </div>
</div>

<!-- PAGE 2: THR TIME -->
<div class="container hidden" id="page2">
  <h1>
    Terima kasih! 😊<br><br>
    <div class="thr-glow" id="thrStatus">
      ⏳ Menghitung THR...
    </div>
  </h1>

  <!-- LOADING BAR -->
  <div style="margin: 30px 0;">
    <div id="loadingBar">
      <div id="progressFill"></div>
    </div>
    <div id="progressText">0%</div>
  </div>
  
  <!-- HASIL THR -->
  <div id="thrResult" class="hidden">
    <div class="thr-glow" style="font-size: 32px; color: #ff6b6b;">
      💸 0 Rupiah 😂
    </div>
    <p style="margin: 15px 0; opacity: 0.9; font-size: 14px;">
      THR Deni belum cair nih 😭
    </p>
  </div>

  <!-- TOMBOL TRANSFER MANUAL -->
  <button class="wa-btn transfer-btn" id="transferBtn" onclick="transferManual()">
    💳 Transfer Manual
    2259-01-009210-50-2
BRI A/N DENI WAFDULLAH AZKA P
  </button>
</div>

<script>
  let growLevel = 0;

  function enggakMaaf() {
    growLevel++; // INFINITE - no limit!
    
    const btnMaaf = document.getElementById('maafBtn');
    
    // Hapus semua class grow sebelumnya
    for (let i = 1; i <= 8; i++) {
      btnMaaf.classList.remove(`grow${i}`);
    }
    
    // Tambah class sesuai level (cycle 1-8)
    const currentGrow = ((growLevel - 1) % 8) + 1;
    btnMaaf.classList.add(`grow${currentGrow}`);
    
    // Z-index makin tinggi
    btnMaaf.style.zIndex = 10 + currentGrow;
  }

  function maafkanDeni() {
    document.getElementById('page1').classList.add('hidden');
    document.getElementById('page2').classList.remove('hidden');
    
    megaLebaranConfetti();
    victorySound();
  }

  function shareWA() {
    const ucapan = encodeURIComponent(
      "🌙 Selamat Idul Fitri 1445H! 🙏\n" +
      "Mohon maaf lahir & batin dari Deni Wafdullah ✨\n" +
      "Maafkan ya jika banyak salah! 😊"
    );
    window.open(`https://wa.me/?text=${ucapan}`, '_blank');
  }

  // 🌟 MEGA CONFETTI
  function megaLebaranConfetti() {
    const lebaranEmojis = ['🌙', '🕌', '✨', '🎉', '💰', '🥳', '🌟', '🎊', '🙌', '💸'];
    
    for (let i = 0; i < 120; i++) {
      setTimeout(() => {
        const confetti = document.createElement('div');
        confetti.innerHTML = lebaranEmojis[Math.floor(Math.random() * lebaranEmojis.length)];
        Object.assign(confetti.style, {
          position: 'fixed',
          left: Math.random() * 100 + 'vw',
          top: '-5vh',
          fontSize: '1.8rem',
          pointerEvents: 'none',
          zIndex: '9999',
          animation: 'confettiFallPremium 3s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards'
        });
        document.body.appendChild(confetti);
        setTimeout(() => confetti.remove(), 3000);
      }, i * 25);
    }
  }

  // 🔊 VICTORY SOUND
  function victorySound() {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [523, 659, 784, 1047];
    notes.forEach((freq, i) => {
      setTimeout(() => {
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.frequency.value = freq;
        oscillator.type = 'sine';
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        oscillator.start(audioCtx.currentTime);
        oscillator.stop(audioCtx.currentTime + 0.2);
      }, i * 150);
    });
  }

  // CSS Confetti
  const style = document.createElement('style');
  style.textContent = `
    @keyframes confettiFallPremium {
      0% { transform: translateY(-100vh) rotate(0deg) scale(0); opacity: 1; }
      40% { transform: translateY(30vh) rotate(180deg) scale(1.2); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg) scale(0.3); opacity: 0; }
    }
  `;
  document.head.appendChild(style);
</script>

</body>
</html>
